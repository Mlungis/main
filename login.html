<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – ResFix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f3ef;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,169,110,.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(26,26,46,.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .card {
      position: relative; z-index: 1;
      background: #fff;
      border: 1px solid #e4e0d8;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(26,26,46,.1), 0 1px 4px rgba(26,26,46,.05);
      padding: 2.75rem 2.5rem 2.5rem;
      width: 100%; max-width: 420px;
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .logo-wrap {
      display: flex; align-items: center; gap: .65rem;
      margin-bottom: 2rem; text-decoration: none;
    }
    .logo-mark {
      width: 36px; height: 36px; border-radius: 8px;
      background: #1a1a2e; display: grid; place-items: center; flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Syne', sans-serif; font-size: 1.2rem;
      font-weight: 800; letter-spacing: -.03em; color: #1a1a2e;
    }
    .card h1 {
      font-family: 'Syne', sans-serif; font-size: 1.55rem;
      font-weight: 800; letter-spacing: -.04em; color: #1a1a2e;
      line-height: 1.15; margin-bottom: .4rem;
    }
    .card .subtitle { font-size: .875rem; color: #6b6660; margin-bottom: 2rem; }
    .input-group { position: relative; margin-bottom: 1.25rem; }
    .input-group input {
      width: 100%;
      padding: .85rem 1rem .85rem 2.75rem;
      border: 1.5px solid #e4e0d8; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: .9rem;
      color: #1a1a2e; background: #f5f3ef; outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .input-group input:focus {
      border-color: #1a1a2e; background: #fff;
      box-shadow: 0 0 0 3px rgba(26,26,46,.07);
    }
    .input-group input::placeholder { color: #a09890; }
    .input-icon {
      position: absolute; left: .875rem; top: 50%;
      transform: translateY(-50%); color: #a09890;
      pointer-events: none; transition: color .15s; display: flex;
    }
    .input-group:focus-within .input-icon { color: #6b6660; }
    .pw-toggle {
      position: absolute; right: .875rem; top: 50%;
      transform: translateY(-50%); cursor: pointer;
      color: #a09890; background: none; border: none; padding: 0;
      display: flex; transition: color .15s;
    }
    .pw-toggle:hover { color: #6b6660; }
    .error-msg {
      background: #fde8e8; border: 1px solid #f5b2b2; border-radius: 8px;
      color: #9b1c1c; font-size: .8125rem;
      padding: .65rem .9rem; margin-bottom: 1.25rem;
      display: none; align-items: center; gap: .5rem;
    }
    .error-msg.show { display: flex; }
    .btn-login {
      width: 100%; padding: .875rem;
      background: #1a1a2e; color: #fff;
      font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700;
      letter-spacing: -.01em; border: none; border-radius: 10px;
      cursor: pointer; transition: background .15s, transform .1s, opacity .15s;
      display: flex; align-items: center; justify-content: center; gap: .55rem;
      margin-bottom: 1.5rem;
    }
    .btn-login:hover:not(:disabled) { background: #2c2c4e; }
    .btn-login:active:not(:disabled) { transform: translateY(1px); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      animation: spin .65s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .role-hints {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: .65rem; margin-bottom: 1.75rem;
    }
    .role-card {
      background: #f5f3ef; border: 1px solid #e4e0d8;
      border-radius: 10px; padding: .85rem .9rem;
      cursor: pointer; transition: all .15s;
    }
    .role-card:hover { border-color: #1a1a2e; background: #fff; }
    .role-card.selected { border-color: #1a1a2e; background: #fff; box-shadow: 0 0 0 2px rgba(26,26,46,.1); }
    .role-card-label {
      font-family: 'DM Mono', monospace; font-size: .62rem;
      letter-spacing: .08em; text-transform: uppercase;
      color: #a09890; margin-bottom: .2rem;
    }
    .role-card-title { font-size: .825rem; font-weight: 600; color: #1a1a2e; }
    .role-card-sub { font-size: .75rem; color: #6b6660; margin-top: .1rem; }
    .role-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: #1a1a2e; display: grid; place-items: center; margin-bottom: .5rem;
    }
    .auth-links { text-align: center; font-size: .8125rem; color: #6b6660; }
    .auth-links a {
      color: #1a1a2e; font-weight: 600; text-decoration: none;
      border-bottom: 1px solid #c8c3b8; transition: border-color .15s;
    }
    .auth-links a:hover { border-color: #1a1a2e; }
    .auth-links .sep { margin: 0 .5rem; color: #c8c3b8; }
    .success-overlay {
      position: fixed; inset: 0;
      background: rgba(26,26,46,.6); backdrop-filter: blur(6px);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; gap: 1rem;
    }
    .success-overlay.show { display: flex; }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: #2d6a4f; display: grid; place-items: center;
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-label {
      font-family: 'Syne', sans-serif; font-size: 1.1rem;
      font-weight: 700; color: #fff; letter-spacing: -.02em;
    }
    .success-sub { font-size: .85rem; color: rgba(255,255,255,.65); }
  </style>
</head>
<body>

<div class="success-overlay" id="successOverlay">
  <div class="success-icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="success-label" id="successLabel">Logged in!</div>
  <div class="success-sub" id="successSub">Redirecting…</div>
</div>

<div class="card">
  <a href="landing.html" class="logo-wrap">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <span class="logo-text">ResFix</span>
  </a>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account to continue</p>

  <div class="role-hints">
    <div class="role-card selected" id="roleResident" onclick="selectRole('resident')">
      <div class="role-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="role-card-label">Role</div>
      <div class="role-card-title">Resident</div>
      <div class="role-card-sub">Submit & track reports</div>
    </div>
    <div class="role-card" id="roleMaintenance" onclick="selectRole('maintenance')">
      <div class="role-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <div class="role-card-label">Role</div>
      <div class="role-card-title">Maintenance</div>
      <div class="role-card-sub">Manage all reports</div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorText"></span>
  </div>

  <div class="input-group">
    <span class="input-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </span>
    <input type="email" id="email" placeholder="Email address" autocomplete="email" required>
  </div>

  <div class="input-group">
    <span class="input-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </span>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
    <button type="button" class="pw-toggle" id="pwToggle" onclick="togglePassword()" tabindex="-1">
      <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <button class="btn-login" id="loginBtn" onclick="loginUser()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    Sign In
  </button>

  <div class="auth-links">
    <a href="forgotPassword.html">Forgot password?</a>
    <span class="sep">·</span>
    Don't have an account? <a href="register.html">Register</a>
    <span class="sep">·</span>
    <a href="landing.html">← Home</a>
  </div>
</div>

<script>
  const SUPABASE_URL      = 'https://ccsoemmzlbsdsawikvya.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjc29lbW16bGJzZHNhd2lrdnlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzI1MzYsImV4cCI6MjA4NjkwODUzNn0.drc7-Yck4DZOs2kiyNe9Kqv2zk3sjjsi48vj8FqvcYU';

  // ── Maintenance credentials validated locally (no Supabase auth) ──
  const MAINTENANCE_EMAIL    = 'maintanance@res.com';
  const MAINTENANCE_PASSWORD = 'ResFix@2026';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let selectedRole = 'resident';

  function selectRole(role) {
    selectedRole = role;
    document.getElementById('roleResident').classList.toggle('selected', role === 'resident');
    document.getElementById('roleMaintenance').classList.toggle('selected', role === 'maintenance');
    if (role === 'maintenance') {
      document.getElementById('email').value = MAINTENANCE_EMAIL;
      document.getElementById('password').focus();
    } else {
      if (document.getElementById('email').value.toLowerCase() === MAINTENANCE_EMAIL) {
        document.getElementById('email').value = '';
      }
      document.getElementById('email').focus();
    }
    hideError();
  }

  function togglePassword() {
    const inp  = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }

  function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorMsg').classList.add('show');
  }
  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  function flashAndRedirect(destination, roleName) {
    document.getElementById('successLabel').textContent = `Welcome${roleName ? ', '+roleName : ''}!`;
    document.getElementById('successSub').textContent   = `Taking you to your dashboard…`;
    document.getElementById('successOverlay').classList.add('show');
    setTimeout(() => { window.location.href = destination; }, 1200);
  }

  async function loginUser() {
    hideError();
    const btn      = document.getElementById('loginBtn');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !email.includes('@') || !email.includes('.')) {
      showError('Please enter a valid email address.'); return;
    }
    if (password.length < 6) {
      showError('Password must be at least 6 characters.'); return;
    }

    const isMaintEmail = email.toLowerCase() === MAINTENANCE_EMAIL;

    // ── MAINTENANCE: validate against constants, skip Supabase auth ──
    if (isMaintEmail || selectedRole === 'maintenance') {
      if (!isMaintEmail) {
        showError('That email is not authorised for the Maintenance role.'); return;
      }
      if (password !== MAINTENANCE_PASSWORD) {
        showError('Incorrect password. Please try again.'); return;
      }
      // Store a simple session flag so mainDash.html can verify access
      sessionStorage.setItem('resfix_role', 'maintenance');
      sessionStorage.setItem('resfix_email', email);
      flashAndRedirect('mainDash.html', 'Maintenance Team');
      return;
    }

    // ── RESIDENT: use Supabase auth as normal ──
    if (selectedRole === 'resident' && isMaintEmail) {
      showError('Please select the Maintenance role to sign in with that account.'); return;
    }

    btn.disabled = true;
    btn.innerHTML = `<div class="spinner"></div> Signing in…`;

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;

      if (data.user && !data.user.email_confirmed_at) {
        showError('Please confirm your email first. Check your inbox.');
        return;
      }

      const displayName = data.user?.email?.split('@')[0] || 'there';
      flashAndRedirect('resDash.html', displayName);

    } catch (err) {
      const msg = err.message || '';
      if (msg.toLowerCase().includes('invalid login')) {
        showError('Incorrect email or password. Please try again.');
      } else if (msg.toLowerCase().includes('email not confirmed')) {
        showError('Please confirm your email before signing in.');
      } else {
        showError(msg || 'Login failed. Please try again.');
      }
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In`;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') loginUser(); });

  document.getElementById('email').addEventListener('input', e => {
    const val = e.target.value.trim().toLowerCase();
    if (val === MAINTENANCE_EMAIL) {
      if (selectedRole !== 'maintenance') selectRole('maintenance');
    } else {
      if (selectedRole !== 'resident') selectRole('resident');
    }
  });

  // Session check — redirect if already logged in
  (async () => {
    // Check maintenance session flag first
    if (sessionStorage.getItem('resfix_role') === 'maintenance') {
      window.location.href = 'mainDash.html'; return;
    }
    // Then check Supabase session for residents
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      window.location.href = 'resDash.html';
    }
  })();
</script>
</body>
</html>
